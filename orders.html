<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harito | Your Orders</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html#top" aria-label="Harito home">
        <span class="brand-mark">ハリト</span>
        <span>Harito</span>
      </a>
      <nav class="main-nav" aria-label="Primary navigation">
        <a href="index.html#collections">Collections</a>
        <a href="advisor.html">Dressing Advisor</a>
        <a href="cart.html">Cart</a>
      </nav>
      <a class="header-chip" href="index.html#collections">Shop Catalog</a>
    </header>

    <main>
      <section class="page-hero orders-hero">
        <p class="eyebrow">Buyer account</p>
        <h1>Your orders</h1>
        <p>Search by email to see Harito order status, payment status, vendor confirmation, delivery, and returns.</p>
      </section>

      <section class="orders-panel">
        <form class="order-lookup-form" id="orderLookupForm">
          <label>
            Buyer email
            <input name="email" type="email" autocomplete="email" placeholder="buyer@example.com" required />
          </label>
          <button class="primary-link" type="submit">Find orders</button>
          <p class="checkout-message" id="ordersMessage" role="status" aria-live="polite"></p>
        </form>

        <div class="order-list" id="orderList" aria-live="polite"></div>
      </section>

      <section class="return-panel" id="returns">
        <div class="section-heading">
          <div class="section-kicker">Returns</div>
          <h2>Request a return</h2>
        </div>
        <form class="return-form" id="returnRequestForm">
          <label>
            Order ID
            <input name="orderId" type="text" placeholder="H-20260627-ABC123" required />
          </label>
          <label>
            Buyer email
            <input name="email" type="email" placeholder="buyer@example.com" required />
          </label>
          <label>
            Reason for return
            <textarea name="reason" rows="4" placeholder="Size issue, damaged item, wrong product..." required></textarea>
          </label>
          <button class="primary-link return-submit" type="submit">Send return request</button>
          <p class="checkout-message" id="returnMessage" role="status" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="orders.js"></script>
  </body>
</html>
